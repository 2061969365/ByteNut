name: Bytenut 续期

on:
  schedule:
    - cron: '0 */1 * * *' # 每小时自动运行
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  run_renewal:
    name: 运行续期脚本
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖项
        run: |
          python -m pip install --upgrade pip
          pip install undetected-chromedriver requests PySocks

      - name: 安装并启动代理
        id: proxy
        env:
          PROXY_NODE: ${{ secrets.PROXY_NODE }}
        run: |
          if [ -z "$PROXY_NODE" ]; then
            echo "use_proxy=false" >> $GITHUB_OUTPUT
            echo "proxy_server=" >> $GITHUB_OUTPUT
            echo "[INFO] 未配置代理，直连模式"
            exit 0
          fi

          python3 << 'PYEOF'
          import os, sys, json, base64
          from urllib.parse import parse_qs, unquote

          def mask(s):
              return f"{s[:2]}***{s[-2:]}" if len(s) > 4 else "****"

          url = os.environ.get("PROXY_NODE", "").strip()
          if not url:
              print("[ERROR] PROXY_NODE 为空")
              sys.exit(1)

          if url.startswith("vless://"):
              protocol = "vless"
              content = url[8:]
          elif url.startswith("vmess://"):
              protocol = "vmess"
              content = url[8:]
          elif url.startswith("trojan://"):
              protocol = "trojan"
              content = url[9:]
          elif url.startswith("ss://"):
              protocol = "ss"
              content = url[5:]
          elif url.startswith("hysteria2://") or url.startswith("hy2://"):
              protocol = "hysteria2"
              content = url.split("://", 1)[1]
          elif url.startswith("tuic://"):
              protocol = "tuic"
              content = url[7:]
          elif url.startswith("socks5://") or url.startswith("socks://"):
              protocol = "socks5"
              content = url.split("://")[1].split("#")[0]
              if "@" in content:
                  server = content.split("@")[1].split(":")[0]
              else:
                  server = content.split(":")[0]
              print(f"[INFO] SOCKS5 -> {mask(server)}")
              with open("use_external_socks.txt", "w") as f:
                  f.write(url.split("#")[0])
              sys.exit(0)
          else:
              print(f"[ERROR] 不支持的协议: {url.split('://')[0]}")
              sys.exit(1)

          if "#" in content:
              content = content.rsplit("#", 1)[0]

          # sing-box 统一配置模板
          config = {
              "log": {"level": "warning"},
              "inbounds": [{
                  "type": "mixed",
                  "listen": "127.0.0.1",
                  "listen_port": 1080
              }],
              "outbounds": []
          }

          if protocol == "vless":
              uuid, rest = content.split("@", 1)
              if "?" in rest:
                  host_port, params_str = rest.split("?", 1)
              else:
                  host_port, params_str = rest, ""

              if ":" in host_port:
                  address, port = host_port.rsplit(":", 1)
              else:
                  address, port = host_port, "443"

              params = parse_qs(params_str)
              security = params.get("security", ["none"])[0]
              network = params.get("type", ["tcp"])[0]
              sni = params.get("sni", [address])[0]
              fp = params.get("fp", ["chrome"])[0]
              flow = params.get("flow", [""])[0]
              pbk = params.get("pbk", [""])[0]
              sid = params.get("sid", [""])[0]
              host = params.get("host", [sni])[0]
              path = unquote(params.get("path", ["/"])[0])
              alpn = params.get("alpn", [""])[0]

              print(f"[INFO] VLESS -> {mask(address)}:{port} (security: {security}, network: {network})")

              outbound = {
                  "type": "vless",
                  "server": address,
                  "server_port": int(port),
                  "uuid": uuid,
                  "tls": {
                      "enabled": security in ("tls", "reality"),
                      "server_name": sni,
                      "utls": {"enabled": True, "fingerprint": fp}
                  }
              }

              if flow:
                  outbound["flow"] = flow

              if security == "reality":
                  outbound["tls"]["reality"] = {
                      "enabled": True,
                      "public_key": pbk,
                      "short_id": sid
                  }

              if network == "ws":
                  outbound["transport"] = {
                      "type": "ws",
                      "path": path,
                      "headers": {"Host": host}
                  }
              elif network == "grpc":
                  outbound["transport"] = {
                      "type": "grpc",
                      "service_name": params.get("serviceName", [""])[0]
                  }

              config["outbounds"].append(outbound)

          elif protocol == "vmess":
              try:
                  padding = 4 - len(content) % 4
                  if padding != 4:
                      content += "=" * padding
                  decoded = base64.b64decode(content).decode("utf-8")
                  vm = json.loads(decoded)
              except Exception as e:
                  print(f"[ERROR] VMess 解析失败: {e}")
                  sys.exit(1)

              address = vm.get("add", "")
              port = int(vm.get("port", 443))
              uuid = vm.get("id", "")
              network = vm.get("net", "tcp")
              tls = vm.get("tls", "")
              sni = vm.get("sni", "") or vm.get("host", address)
              host = vm.get("host", address)
              path = vm.get("path", "/")
              fp = vm.get("fp", "chrome")

              print(f"[INFO] VMess -> {mask(address)}:{port} (network: {network}, tls: {tls})")

              outbound = {
                  "type": "vmess",
                  "server": address,
                  "server_port": port,
                  "uuid": uuid,
                  "security": "auto",
                  "tls": {
                      "enabled": tls == "tls",
                      "server_name": sni,
                      "utls": {"enabled": True, "fingerprint": fp}
                  }
              }

              if network == "ws":
                  outbound["transport"] = {
                      "type": "ws",
                      "path": path,
                      "headers": {"Host": host}
                  }
              elif network == "grpc":
                  outbound["transport"] = {
                      "type": "grpc",
                      "service_name": vm.get("path", "").lstrip("/")
                  }

              config["outbounds"].append(outbound)

          elif protocol == "trojan":
              password, rest = content.split("@", 1)
              if "?" in rest:
                  host_port, params_str = rest.split("?", 1)
              else:
                  host_port, params_str = rest, ""

              if ":" in host_port:
                  address, port = host_port.rsplit(":", 1)
              else:
                  address, port = host_port, "443"

              params = parse_qs(params_str)
              sni = params.get("sni", [address])[0]
              network = params.get("type", ["tcp"])[0]
              host = params.get("host", [sni])[0]
              path = unquote(params.get("path", ["/"])[0])
              fp = params.get("fp", ["chrome"])[0]

              print(f"[INFO] Trojan -> {mask(address)}:{port} (network: {network})")

              outbound = {
                  "type": "trojan",
                  "server": address,
                  "server_port": int(port),
                  "password": password,
                  "tls": {
                      "enabled": True,
                      "server_name": sni,
                      "utls": {"enabled": True, "fingerprint": fp}
                  }
              }

              if network == "ws":
                  outbound["transport"] = {
                      "type": "ws",
                      "path": path,
                      "headers": {"Host": host}
                  }
              elif network == "grpc":
                  outbound["transport"] = {
                      "type": "grpc",
                      "service_name": params.get("serviceName", [""])[0]
                  }

              config["outbounds"].append(outbound)

          elif protocol == "ss":
              try:
                  if "@" in content:
                      encoded, server_part = content.split("@", 1)
                      decoded = base64.b64decode(encoded + "==").decode("utf-8")
                      method, password = decoded.split(":", 1)
                      address, port = server_part.split(":", 1)
                  else:
                      decoded = base64.b64decode(content + "==").decode("utf-8")
                      if "@" in decoded:
                          user_part, server_part = decoded.split("@", 1)
                          method, password = user_part.split(":", 1)
                          address, port = server_part.split(":", 1)
                      else:
                          raise ValueError("无法解析")
              except Exception as e:
                  print(f"[ERROR] Shadowsocks 解析失败: {e}")
                  sys.exit(1)

              print(f"[INFO] Shadowsocks -> {mask(address)}:{port}")

              config["outbounds"].append({
                  "type": "shadowsocks",
                  "server": address,
                  "server_port": int(port),
                  "method": method,
                  "password": password
              })

          elif protocol == "hysteria2":
              auth, rest = content.split("@", 1)
              if "?" in rest:
                  host_port, params_str = rest.split("?", 1)
              else:
                  host_port, params_str = rest, ""

              if ":" in host_port:
                  address, port = host_port.rsplit(":", 1)
              else:
                  address, port = host_port, "443"

              params = parse_qs(params_str)
              sni = params.get("sni", [address])[0]
              insecure = params.get("insecure", ["0"])[0] == "1"

              print(f"[INFO] Hysteria2 -> {mask(address)}:{port} (sni: {sni})")

              config["outbounds"].append({
                  "type": "hysteria2",
                  "server": address,
                  "server_port": int(port),
                  "up_mbps": 100,
                  "down_mbps": 100,
                  "password": auth,
                  "tls": {
                      "enabled": True,
                      "server_name": sni,
                      "insecure": insecure
                  }
              })

          elif protocol == "tuic":
              uuid_pass, rest = content.split("@", 1)
              if ":" in uuid_pass:
                  uuid, password = uuid_pass.split(":", 1)
              else:
                  uuid, password = uuid_pass, ""

              if "?" in rest:
                  host_port, params_str = rest.split("?", 1)
              else:
                  host_port, params_str = rest, ""

              if ":" in host_port:
                  address, port = host_port.rsplit(":", 1)
              else:
                  address, port = host_port, "443"

              params = parse_qs(params_str)
              sni = params.get("sni", [address])[0]
              insecure = params.get("allow_insecure", ["0"])[0] == "1"
              cc = params.get("congestion_control", ["bbr"])[0]

              print(f"[INFO] TUIC -> {mask(address)}:{port} (sni: {sni}, cc: {cc})")

              config["outbounds"].append({
                  "type": "tuic",
                  "server": address,
                  "server_port": int(port),
                  "uuid": uuid,
                  "password": password,
                  "congestion_control": cc,
                  "udp_relay_mode": "native",
                  "tls": {
                      "enabled": True,
                      "server_name": sni,
                      "insecure": insecure
                  }
              })

          with open("singbox_config.json", "w") as f:
              json.dump(config, f, indent=2)

          print(f"[INFO] ✅ {protocol.upper()} (sing-box) 配置已生成")
          PYEOF

          # 外部 SOCKS5 代理
          if [ -f "use_external_socks.txt" ]; then
            EXTERNAL_SOCKS=$(cat use_external_socks.txt)
            echo "proxy_server=$EXTERNAL_SOCKS" >> $GITHUB_OUTPUT
            echo "use_proxy=true" >> $GITHUB_OUTPUT
            echo "[INFO] ✅ 使用外部 SOCKS5 代理"
            exit 0
          fi

          # 下载并启动 sing-box
          echo "[INFO] 下载 sing-box..."
          LATEST=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep tag_name | cut -d '"' -f 4 | sed 's/v//')
          if [ -z "$LATEST" ]; then
            echo "[WARN] 无法获取版本，使用 v1.13.14"
            LATEST="1.13.14"
          fi
          echo "[INFO] sing-box 版本: $LATEST"
          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${LATEST}/sing-box-${LATEST}-linux-amd64.tar.gz" -O singbox.tar.gz
          tar -xzf singbox.tar.gz
          SINGBOX=$(find . -name "sing-box" -type f -path "*/sing-box*" | head -1)
          chmod +x "$SINGBOX"
          ./$SINGBOX run -c singbox_config.json > singbox.log 2>&1 &
          sleep 8

          echo "[INFO] 测试代理连接..."
          for i in 1 2 3 4 5; do
            if curl -x socks5://127.0.0.1:1080 -s --max-time 15 https://api.ipify.org > /dev/null 2>&1; then
              echo "proxy_server=socks5://127.0.0.1:1080" >> $GITHUB_OUTPUT
              echo "use_proxy=true" >> $GITHUB_OUTPUT
              echo "[INFO] ✅ 代理连接成功"
              exit 0
            fi
            echo "[WARN] 尝试 $i/5..."
            sleep 3
          done

          # 代理启动失败，仍输出直连，不中断工作流
          echo "[ERROR] ❌ 代理连接失败，回退直连"
          echo "use_proxy=false" >> $GITHUB_OUTPUT
          echo "proxy_server=" >> $GITHUB_OUTPUT

      - name: 运行续期脚本
        env:
          BYTENUT: ${{ secrets.BYTENUT }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY: ${{ steps.proxy.outputs.proxy_server }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq xvfb
          xvfb-run -a python3 main.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: artifacts/
